name: Build wheels

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  # VieCut's bundled tlx uses cmake_minimum_required(VERSION 2.8) which
  # CMake 4.x rejects. This env var tells CMake to accept older policies.
  CMAKE_ARGS: "-DCMAKE_POLICY_VERSION_MINIMUM=3.5"

jobs:
  build-linux:
    name: Linux ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["cp39", "cp310", "cp311", "cp312", "cp313"]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: pypa/cibuildwheel@v2.22
        env:
          CIBW_BUILD: "${{ matrix.python-version }}-manylinux_x86_64"
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_ENVIRONMENT: "CXX=g++ CMAKE_ARGS=-DCMAKE_POLICY_VERSION_MINIMUM=3.5"
          CIBW_TEST_REQUIRES: pytest
          CIBW_TEST_COMMAND: pytest {project}/tests -v
          CIBW_REPAIR_WHEEL_COMMAND: >-
            auditwheel repair -w {dest_dir} {wheel}

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-linux-${{ matrix.python-version }}
          path: wheelhouse/*.whl

  build-macos-arm64:
    name: macOS arm64 ${{ matrix.python-version }}
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        python-version: ["cp39", "cp310", "cp311", "cp312", "cp313"]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: pypa/cibuildwheel@v2.22
        env:
          CIBW_BUILD: "${{ matrix.python-version }}-macosx_arm64"
          CIBW_BEFORE_ALL: "brew install libomp"
          CIBW_ENVIRONMENT: >-
            CC=clang
            CXX=clang++
            MACOSX_DEPLOYMENT_TARGET=14.0
            OpenMP_ROOT=/opt/homebrew/opt/libomp
            CMAKE_ARGS="-DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DOpenMP_ROOT=/opt/homebrew/opt/libomp"
          CIBW_TEST_REQUIRES: pytest
          CIBW_TEST_COMMAND: pytest {project}/tests -v
          CIBW_REPAIR_WHEEL_COMMAND: >-
            delocate-wheel --require-archs arm64 -w {dest_dir} {wheel}

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-macos-arm64-${{ matrix.python-version }}
          path: wheelhouse/*.whl

  build-windows:
    name: Windows ${{ matrix.python-version }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["cp39", "cp310", "cp311", "cp312", "cp313"]
    steps:
      - run: git config --global core.longpaths true

      # Shallow clone without recursive submodules, then selectively init
      # only the ones needed for the build. HeidelbergMotifClustering has
      # deeply nested submodules with paths that exceed Windows limits.
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Init submodules (skip deeply nested ones)
        shell: bash
        run: |
          git submodule update --init external_repositories/KaHIP
          git submodule update --init external_repositories/VieClus
          git submodule update --init --recursive external_repositories/VieCut
          git submodule update --init external_repositories/CHILS
          git submodule update --init --recursive external_repositories/KaMIS
          git submodule update --init --recursive external_repositories/SCC
          git submodule update --init external_repositories/HeiOrient
          git submodule update --init --recursive external_repositories/fpt-max-cut
          git submodule update --init external_repositories/HeiStream
          git submodule update --init --recursive external_repositories/HeiStream
          git submodule update --init external_repositories/HyperMIS
          # HeidelbergMotifClustering: only top level, skip experimental_data/ submodules
          git submodule update --init external_repositories/HeidelbergMotifClustering

      - uses: pypa/cibuildwheel@v2.22
        env:
          CIBW_BUILD: "${{ matrix.python-version }}-win_amd64"
          CIBW_ENVIRONMENT: "CMAKE_ARGS=-DCMAKE_POLICY_VERSION_MINIMUM=3.5"
          CIBW_TEST_REQUIRES: pytest
          CIBW_TEST_COMMAND: pytest {project}/tests -v

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-windows-${{ matrix.python-version }}
          path: wheelhouse/*.whl

  build-sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install build
      - run: python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  create-release:
    name: Create GitHub Release
    needs: [build-linux, build-macos-arm64, build-windows, build-sdist]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
