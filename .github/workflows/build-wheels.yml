name: Build wheels

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-linux:
    name: Linux ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["cp39", "cp310", "cp311", "cp312", "cp313"]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: pypa/cibuildwheel@v2.22
        env:
          CIBW_BUILD: "${{ matrix.python-version }}-manylinux_x86_64"
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_ENVIRONMENT: "CXX=g++"
          CIBW_REPAIR_WHEEL_COMMAND: >-
            auditwheel repair -w {dest_dir} {wheel}

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-linux-${{ matrix.python-version }}
          path: wheelhouse/*.whl

  build-macos-arm64:
    name: macOS arm64 ${{ matrix.python-version }}
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        python-version: ["cp39", "cp310", "cp311", "cp312", "cp313"]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: pypa/cibuildwheel@v2.22
        env:
          CIBW_BUILD: "${{ matrix.python-version }}-macosx_arm64"
          CIBW_ENVIRONMENT: "CXX=clang++ MACOSX_DEPLOYMENT_TARGET=14.0"
          CIBW_BEFORE_ALL: "brew install libomp"
          CIBW_REPAIR_WHEEL_COMMAND: >-
            delocate-wheel --require-archs arm64 -w {dest_dir} {wheel}

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-macos-arm64-${{ matrix.python-version }}
          path: wheelhouse/*.whl

  build-macos-x86_64:
    name: macOS x86_64 ${{ matrix.python-version }}
    runs-on: macos-13
    strategy:
      fail-fast: false
      matrix:
        python-version: ["cp39", "cp310", "cp311", "cp312", "cp313"]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: pypa/cibuildwheel@v2.22
        env:
          CIBW_BUILD: "${{ matrix.python-version }}-macosx_x86_64"
          CIBW_ENVIRONMENT: "CXX=clang++ MACOSX_DEPLOYMENT_TARGET=13.0"
          CIBW_BEFORE_ALL: "brew install libomp"
          CIBW_REPAIR_WHEEL_COMMAND: >-
            delocate-wheel --require-archs x86_64 -w {dest_dir} {wheel}

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-macos-x86_64-${{ matrix.python-version }}
          path: wheelhouse/*.whl

  build-windows:
    name: Windows ${{ matrix.python-version }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["cp39", "cp310", "cp311", "cp312", "cp313"]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: pypa/cibuildwheel@v2.22
        env:
          CIBW_BUILD: "${{ matrix.python-version }}-win_amd64"

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-windows-${{ matrix.python-version }}
          path: wheelhouse/*.whl

  build-sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install build
      - run: python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  create-release:
    name: Create GitHub Release
    needs: [build-linux, build-macos-arm64, build-macos-x86_64, build-windows, build-sdist]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
